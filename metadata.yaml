name: "TinyAPI聚合插件"
author: "M0nk3yOuO"
version: "1.7.9"
description: "调用TinyAPI的290+免费API接口，支持关键词快捷调用，图片/音频/视频自动识别并直接发送，递归搜索响应中的媒体URL，支持关键词与图片同时发送"
repo: "https://github.com/M0nk3yOuO/AstrBot_Plugin_TinyAPI"
tags: ["api", "tinyapi", "聚合", "工具", "图片识别"]
commands:
  - command: "api查询"
    description: "查看所有可用关键词列表（支持别名：查看api、api列表、关键词列表、可用api等）"
  - command: "<关键词>"
    description: "直接发送关键词调用对应API（无需/前缀，如：必应壁纸、天气 北京）"
  - command: "<关键词> + 图片"
    description: "一条消息同时发送关键词和图片，用于调用需要图片参数的API（如：百度OCR + 图片）"
